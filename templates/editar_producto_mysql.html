<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto MySQL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Editar Producto</h2>

    <form method="POST">
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            <select name="id_categoria" class="form-control" required>
                {% for c in categorias %}
                <option value="{{ c.id_categoria }}" {% if c.id_categoria == producto.id_categoria %}selected{% endif %}>
                    {{ c.nombre_categoria }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Proveedor</label>
            <select name="id_proveedor" class="form-control" required>
                {% for p in proveedores %}
                <option value="{{ p.id_proveedor }}" {% if p.id_proveedor == producto.id_proveedor %}selected{% endif %}>
                    {{ p.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="{{ url_for('productos_mysql') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
