{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Productos</h2>

<!-- FORMULARIO -->
<form method="POST" action="{{ url_for('agregar') }}" class="row g-2">
    <div class="col-md-3">
        <input type="text" name="nombre" class="form-control" placeholder="Nombre del producto" required>
    </div>

    <div class="col-md-2">
        <input type="number" name="cantidad" class="form-control" placeholder="Cantidad" required>
    </div>

    <div class="col-md-2">
        <input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required>
    </div>

    <div class="col-md-3">
        <select name="id_categoria" class="form-select" required>
            <option value="">Seleccione categoría</option>
            {% for categoria in categorias %}
            <option value="{{ categoria[0] }}">{{ categoria[1] }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100">Agregar</button>
    </div>
</form>

<hr>

<!-- TABLA -->
<table class="table table-bordered table-striped mt-3">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Usuario</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for producto in productos %}
        <tr>
            <td>{{ producto[0] }}</td>
            <td>{{ producto[1] }}</td>
            <td>{{ producto[2] }}</td>
            <td>${{ producto[3] }}</td>
            <td>{{ producto[4] }}</td>
            <td>{{ producto[5] }}</td>
            <td>
                <a href="{{ url_for('editar', id_producto=producto[0]) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('eliminar', id_producto=producto[0]) }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
