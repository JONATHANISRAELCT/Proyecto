{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Usuarios Registrados</h2>

<table class="table table-striped table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Password</th>
</tr>
</thead>

<tbody>

{% for usuario in usuarios %}
<tr>
<td>{{ usuario[0] }}</td>
<td>{{ usuario[1] }}</td>
<td>{{ usuario[2] }}</td>
<td>{{ usuario[3] }}</td>
</tr>
{% endfor %}

</tbody>

</table>

{% endblock %}
