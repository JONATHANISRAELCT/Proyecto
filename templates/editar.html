{% extends "base.html" %}

{% block content %}
<h2>Editar producto</h2>

<form method="POST">
    <input type="text" name="nombre" value="{{ producto[1] }}" required>
    <input type="number" name="cantidad" value="{{ producto[2] }}" required>
    <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" required>

    <select name="id_categoria" required>
        {% for categoria in categorias %}
        <option value="{{ categoria[0] }}" {% if categoria[0] == producto[4] %}selected{% endif %}>
            {{ categoria[1] }}
        </option>
        {% endfor %}
    </select>

    <button type="submit">Actualizar</button>
</form>
{% endblock %}
